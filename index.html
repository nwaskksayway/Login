<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Inter Empresas</title>
    <style>
        /* Estilização Geral */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }

        /* Espaço para sua Logo */
        .logo-container img {
            max-width: 180px;
            margin-bottom: 40px;
        }

        /* Formulário */
        .input-group {
            text-align: left;
            margin-bottom: 15px;
            position: relative;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        label {
            color: #757575;
            font-size: 14px;
        }

        .forgot-link {
            color: #8B4513; /* Tom marrom/laranja escuro do Inter */
            font-size: 13px;
            text-decoration: none;
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #f2f5f7;
            box-sizing: border-box;
            font-size: 16px;
        }

        /* Switch Lembrar Operador */
        .remember-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            color: #757575;
            font-size: 14px;
        }

        /* Botões */
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            margin-bottom: 15px;
            display: block;
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn-continuar {
            background-color: #FF7A00; /* Laranja Inter */
            color: white;
            border: none;
        }

        .btn-continuar:hover {
            background-color: #e66e00;
        }

        .btn-qr {
            background-color: white;
            color: #8B4513;
            border: 1px solid #dcdcdc;
        }

        .btn-qr:hover {
            background-color: #f9f9f9;
        }

    </style>
</head>
<body>

    <div class="login-container">
        
        <div class="logo-container">
            <img src="https://logodownload.org/wp-content/uploads/2018/11/banco-inter-logo-0-1.png" alt="Logo Inter">
        </div>

        <form action="#">
            <div class="input-group">
                <div class="label-row">
                    <label>Operador</label>
                    <a href="#" class="forgot-link">Esqueci meu operador ⓘ</a>
                </div>
                <input type="text" placeholder="">
            </div>

            <div class="remember-row">
                <span>Lembrar Operador</span>
                <input type="checkbox" style="cursor: pointer;">
            </div>

            <a href="URL_DA_PROXIMA_PAGINA" class="btn btn-continuar">
                Continuar
            </a>

            <button type="button" class="btn btn-qr">
                Acessar com QR Code
            </button>
        </form>

    </div>

</body>
</html>
