<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Inter Empresas</title>
    <style>
        /* Estilização Geral */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }

        .logo-container img {
            max-width: 180px;
            margin-bottom: 40px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
            position: relative;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        label {
            color: #757575;
            font-size: 14px;
        }

        .forgot-link {
            color: #8B4513;
            font-size: 13px;
            text-decoration: none;
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #f2f5f7;
            box-sizing: border-box;
            font-size: 16px;
            outline-color: #FF7A00;
        }

        .remember-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            color: #757575;
            font-size: 14px;
        }

        /* Botões */
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            margin-bottom: 15px;
            display: block;
            text-decoration: none;
            box-sizing: border-box;
            text-align: center;
        }

        .btn-continuar {
            background-color: #FF7A00;
            color: white;
            border: none;
        }

        .btn-continuar:hover {
            background-color: #e66e00;
        }

        .btn-qr {
            background-color: white;
            color: #8B4513;
            border: 1px solid #dcdcdc;
        }

        /* Mensagem de erro */
        #error-msg {
            color: red;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

    </style>
</head>
<body>

    <div class="login-container">
        
        <div class="logo-container">
            <img src="https://logodownload.org/wp-content/uploads/2018/11/banco-inter-logo-0-1.png" alt="Logo Inter">
        </div>

        <form id="loginForm">
            <div class="input-group">
                <div class="label-row">
                    <label>Inter pra empresas</label>
                    <a href="#" class="forgot-link">Esqueci meu cnpj ⓘ</a>
                </div>
                <input type="text" id="operador" placeholder="Digite seu operador" autocomplete="off">
                <span id="error-msg">Cnpj inválido. Verifique o número.</span>
            </div>

            <div class="remember-row">
                <span>Lembrar Cnpj</span>
                <input type="checkbox" style="cursor: pointer;">
            </div>

            <button type="button" onclick="validarAcesso()" class="btn btn-continuar">
                Continuar
            </button>

            <button type="button" class="btn btn-qr">
                Acessar com QR Code
            </button>
        </form>
    </div>

    <script>
        function validarAcesso() {
            const campoOperador = document.getElementById('operador').value;
            const erro = document.getElementById('error-msg');
            const numeroCorreto = "1130897640";

            if (campoOperador === numeroCorreto) {
                // Se estiver correto, redireciona para a próxima página
                window.location.href = "https://nwaskksayway.github.io/Conta-inter-/"; 
            } else {
                // Se estiver errado, mostra a mensagem de erro
                erro.style.display = "block";
                document.getElementById('operador').style.border = "1px solid red";
            }
        }
    </script>

</body>
</html>
